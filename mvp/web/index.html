<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <title>Mail Fullboard</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --border:#dde3ef;
      --text:#1f2937;
      --muted:#6b7280;
      --primary:#2563eb;
      --primary-soft:#dbeafe;
      --danger:#dc2626;
      --danger-soft:#fee2e2;
      --ok:#059669;
      --shadow:0 10px 28px rgba(15,23,42,.08);
    }
    *{box-sizing:border-box}
    body{font-family:Inter,Segoe UI,Arial,sans-serif;margin:0;background:var(--bg);color:var(--text)}
    .shell{width:100%;max-width:none;margin:0;padding:12px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow)}
    .header{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;position:relative}
    .title{margin:0;font-size:28px}
    .sub{margin:2px 0 0;color:var(--muted)}
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;padding:0 20px 20px}
    .kpi{background:#f8fafc;border:1px solid var(--border);border-radius:12px;padding:12px}
    .kpi-label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.06em}
    .kpi-value{margin-top:6px;font-size:24px;font-weight:700}
    .toolbar{display:flex;flex-wrap:wrap;gap:10px;padding:16px 20px;border-top:1px solid var(--border)}
    button{border:1px solid var(--border);background:#fff;color:var(--text);padding:9px 12px;border-radius:10px;font-weight:600;cursor:pointer}
    button.primary{background:var(--primary);border-color:var(--primary);color:#fff}
    button.danger{background:var(--danger);border-color:var(--danger);color:#fff}
    button:hover{filter:brightness(.98)}
    .controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;padding:0 20px 16px}
    .field{display:flex;flex-direction:column;gap:6px}
    label{font-size:12px;color:var(--muted);font-weight:700;letter-spacing:.04em;text-transform:uppercase}
    select,input{width:100%;padding:9px;border:1px solid var(--border);border-radius:10px;background:#fff}
    table{border-collapse:separate;border-spacing:0;width:100%}
    thead th{position:sticky;top:0;background:#f8fafc;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
    td,th{border-bottom:1px solid var(--border);padding:10px;text-align:left;vertical-align:top}
    .table-wrap{max-height:55vh;overflow:auto;border-top:1px solid var(--border)}
    .badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:12px;font-weight:700}
    .badge-ok{background:#dcfce7;color:#166534}
    .badge-pending{background:#fef9c3;color:#854d0e}
    .badge-failed{background:var(--danger-soft);color:#991b1b}
    .badge-retry{background:var(--primary-soft);color:#1d4ed8}
    .badge-noretry{background:#f3f4f6;color:#374151}
    .hidden{display:none}
    .login-shell{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg,#eef4ff 0%,#f8fbff 45%,#f3f6fb 100%);
      padding:24px;
    }
    #loginCard{
      width:100%;
      max-width:420px;
      border:1px solid var(--border);
      border-radius:16px;
      background:rgba(255,255,255,.95);
      box-shadow:var(--shadow);
      padding:28px 24px;
    }
    .login-title{margin:0;font-size:28px}
    .login-subtitle{margin:8px 0 0;color:var(--muted)}
    .login-form{margin-top:20px;display:flex;flex-direction:column;gap:14px}
    .login-form input{
      font-size:15px;
      padding:11px 12px;
      border-radius:12px;
      border:1px solid #cfd7e4;
      transition:border-color .2s, box-shadow .2s;
    }
    .login-form input:focus{
      border-color:var(--primary);
      outline:none;
      box-shadow:0 0 0 3px rgba(37,99,235,.15);
    }
    .login-form button{margin-top:2px;padding:11px 14px}
    #loginError{margin:0;color:#c62828;min-height:18px}
    #feedback{padding:0 20px 14px;color:var(--muted)}
    .sp-inline{display:flex;gap:10px;align-items:flex-end;width:100%;flex-wrap:nowrap}
    .sp-inline .field{min-width:0}
    .sp-inline .field.remote-field{flex:0 0 210px}
    .sp-inline .field.producer-field{flex:1 1 auto}
    .sp-row{display:flex;gap:8px;align-items:center}
    .sp-row select{flex:1 1 auto;min-width:0}
    .sp-row button{white-space:nowrap}
    .db-filter-list{display:flex;flex-direction:column;gap:6px;max-height:180px;overflow:auto}
    .db-filter-item{display:flex;gap:8px;align-items:center;font-size:13px;color:var(--text)}
    #remoteTarget{max-width:none}
    #producerSelect{min-width:0}
    @media (max-width: 880px){
      .sp-inline{flex-wrap:wrap}
      .sp-inline .field.remote-field,.sp-inline .field.producer-field{flex:1 1 100%}
      .sp-row{flex-wrap:wrap}
      #remoteTarget,#producerSelect{max-width:none;min-width:0}
    }
    .info-box{margin:0 20px 16px;padding:12px;border:1px solid var(--border);border-radius:10px;background:#f8fafc}
    .small{font-size:12px;color:var(--muted);margin:2px 0}

    .header-actions{display:flex;align-items:center;gap:8px;position:relative}
    .icon-btn{width:38px;height:38px;padding:0;display:inline-flex;align-items:center;justify-content:center;font-size:18px}
    .settings-panel{
      position:absolute;
      top:calc(100% + 8px);
      right:0;
      z-index:30;
      min-width:300px;
      max-width:420px;
      padding:12px;
      border:1px solid var(--border);
      border-radius:12px;
      background:#fff;
      box-shadow:var(--shadow);
    }
    .settings-title{margin:0 0 10px;font-size:14px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
    .settings-section{padding:10px 0;border-top:1px solid #e5e7eb}
    .settings-section:first-of-type{border-top:none;padding-top:0}
    .settings-actions{display:flex;gap:8px;flex-wrap:wrap}
    .settings-note{margin:6px 0 0}
  </style>
</head>
<body>
  <div id="loginView" class="login-shell hidden">
    <div id="loginCard">
      <h2 class="login-title">Ingreso al panel</h2>
      <p class="login-subtitle">Accedé con tu usuario para administrar Mail Fullboard.</p>
      <form id="loginForm" class="login-form">
        <div class="field">
          <label for="username">Usuario</label>
          <input id="username" type="text" value="admin" autocomplete="username"/>
        </div>
        <div class="field">
          <label for="password">Clave</label>
          <input id="password" type="password" value="admin123" autocomplete="current-password"/>
        </div>
        <button class="primary" type="submit">Ingresar</button>
        <p id="loginError"></p>
      </form>
    </div>
  </div>

  <div id="panelView" class="shell hidden">
    <div class="card">
      <div class="header">
        <div>
          <h2 class="title">Mail Fullboard</h2>
          <p class="sub">Panel operativo con filtros inteligentes de errores.</p>
        </div>
        <div class="header-actions">
          <span id="who" style="margin-right:8px"></span>
          <button class="icon-btn" type="button" onclick="toggleSettingsPanel()" aria-label="Abrir configuración">⚙️</button>
          <button onclick="doLogout()">Cerrar sesión</button>
          <div id="settingsPanel" class="settings-panel hidden">
            <h3 class="settings-title">Parámetros y configuración</h3>
            <div class="settings-section">
              <div class="settings-actions">
                <button type="button" onclick="openRemoteObjects()">Visibilidad de SP (dbo)</button>
                <button type="button" onclick="openDbMailCallers()">Relevamiento de sp_send_dbmail</button>
                <button type="button" onclick="openSqlMailMonitor()">Monitoreo SQL Mail</button>
                <button type="button" onclick="openMailDbInsights()">Revisar tablas MailDB</button>
              </div>
            </div>
            <div class="settings-section">
              <label style="margin-bottom:6px">Filtrar bases visibles para ejecutar SP</label>
              <div id="databaseFilterOptions" class="db-filter-list"></div>
              <p id="databaseFilterSummary" class="small settings-note">Cargando bases...</p>
            </div>
          </div>
        </div>
      </div>

      <div class="kpi-grid">
        <div class="kpi"><div class="kpi-label">Pendientes</div><div class="kpi-value" id="pending">0</div></div>
        <div class="kpi"><div class="kpi-label">Enviados</div><div class="kpi-value" id="sent">0</div></div>
        <div class="kpi"><div class="kpi-label">Fallidos</div><div class="kpi-value" id="failed">0</div></div>
        <div class="kpi"><div class="kpi-label">Total</div><div class="kpi-value" id="total">0</div></div>
      </div>

      <div class="toolbar">
        <button class="primary" onclick="runSender()">Ejecutar Sender</button>
        <button onclick="requeueRetryable()">Reencolar recuperables</button>
        <button class="danger" onclick="requeueAll()">Reencolar TODO Failed</button>
        <button class="danger" onclick="deleteSelected()">Borrar seleccionados</button>
        <button class="danger" onclick="deleteFiltered()">Borrar filtrados</button>
        <button onclick="loadAll()">Refrescar</button>
      </div>

      <div class="controls" style="padding-top:0">
        <div class="sp-inline">
          <div class="field remote-field">
            <label>Ambiente remoto</label>
            <select id="remoteTarget" onchange="onRemoteTargetChange()">
              <option value="prod">DTTPROD</option>
              <option value="test">DTTPRUEBA</option>
              <option value="express">SRV-EnviosMail (SQL Express)</option>
            </select>

          </div>
          <div class="field producer-field">
            <label>Ejecutar SP</label>
            <div class="sp-row">
              <select id="producerSelect" onchange="renderProducerDescription()">
                <option value="">Seleccioná un SP</option>
              </select>
              <button onclick="runSelectedProducer()">Ejecutar SP</button>
            </div>
            <p id="producerHelp" class="small">Sin selección.</p>
          </div>
        </div>
      </div>

      <div class="controls">
        <div class="field">
          <label>Búsqueda dinámica</label>
          <input id="searchFilter" type="text" placeholder="Buscar por mail, asunto, motivo, estado..." oninput="loadQueue()"/>
        </div>
        <div class="field">
          <label>Estado</label>
          <select id="statusFilter" onchange="loadQueue()">
            <option value="">Todos</option>
            <option value="Waiting">Waiting</option>
            <option value="Processing">Processing</option>
            <option value="Failed">Failed</option>
            <option value="Sent">Sent</option>
          </select>
        </div>
        <div class="field">
          <label>Motivo de error</label>
          <select id="errorFilter" onchange="loadQueue()">
            <option value="">Todos</option>
            <option value="MAILBOX_NOT_FOUND">MAILBOX_NOT_FOUND</option>
            <option value="MAILBOX_FULL">MAILBOX_FULL</option>
            <option value="SENDING_LIMIT">SENDING_LIMIT</option>
            <option value="TEMPORARY">TEMPORARY</option>
            <option value="OTHER">OTHER</option>
            <option value="UNKNOWN">UNKNOWN</option>
          </select>
        </div>
        <div class="field">
          <label>Regla de reintento</label>
          <select id="retryRule" onchange="loadQueue()">
            <option value="">Todos</option>
            <option value="retryable">Solo recuperables</option>
            <option value="noretry">Solo no recuperables</option>
          </select>
        </div>
      </div>

      <p id="feedback"></p>
      <div id="dbInfo" class="info-box hidden"></div>

      <div class="table-wrap">
        <table id="tbl"></table>
      </div>
    </div>
  </div>

<script>
const API_ROOT = (() => {
  if (window.__MAIL_API_ROOT__) return String(window.__MAIL_API_ROOT__).replace(/\/$/, "");
  return window.location.origin;
})();
const API = `${API_ROOT}/api`;
const AUTH = `${API_ROOT}/auth`;
let queueSearchTimer = null;
let queueDataCache = [];

async function j(url,opt){
  const r=await fetch(url,{credentials:"include",...(opt||{})});
  if(r.status===401){showLogin(); throw new Error("No autorizado");}

  const payload = await r.json().catch(() => ({}));
  if(!r.ok){
    const msg = payload?.error || `Error HTTP ${r.status}`;
    throw new Error(msg);
  }

  return payload;
}

function showLogin(){
  loginView.classList.remove("hidden");
  panelView.classList.add("hidden");
}

function showPanel(user){
  who.textContent = user ? `Usuario: ${user}` : "";
  panelView.classList.remove("hidden");
  loginView.classList.add("hidden");
}

async function checkAuth(){
  try {
    const st = await j(`${AUTH}/status`);
    if(st.loggedIn){
      showPanel(st.user);
      await loadAll();
    }else{
      showLogin();
    }
  } catch (_err) {
    showLogin();
  }
}

async function doLogin(){
  loginError.textContent="";
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const r = await fetch(`${AUTH}/login`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    credentials:"include",
    body:JSON.stringify({username,password})
  });

  if(!r.ok){
    loginError.textContent="Usuario o clave incorrectos";
    return;
  }

  await checkAuth();
}

function initLoginForm(){
  const form = document.getElementById("loginForm");
  if (!form) return;
  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    await doLogin();
  });
}

async function doLogout(){
  await j(`${AUTH}/logout`, {method:"POST"});
  showLogin();
}

function openRemoteObjects(){
  window.location.href = `${API_ROOT}/remote-objects`;
}

function openDbMailCallers(){
  window.location.href = `${API_ROOT}/dbmail-callers`;
}

function openSqlMailMonitor(){
  window.location.href = `${API_ROOT}/sqlmail-monitor`;
}

function openMailDbInsights(){
  window.location.href = `${API_ROOT}/maildb-insights`;
}

async function loadMetrics(){
  try {
    const m=await j(`${API}/metrics`);
    pending.textContent=m.pending||0; sent.textContent=m.sent||0;
    failed.textContent=m.failed||0; total.textContent=m.total||0;
  } catch (err) {
    pending.textContent=0; sent.textContent=0;
    failed.textContent=0; total.textContent=0;
    feedback.textContent = `No se pudieron cargar métricas: ${err.message}`;
  }
}

async function loadQueue(){
  if (queueSearchTimer) clearTimeout(queueSearchTimer);
  queueSearchTimer = setTimeout(loadQueueNow, 150);
}

async function loadQueueNow(){
  const status = document.getElementById("statusFilter")?.value || "";
  const errorCategory = document.getElementById("errorFilter")?.value || "";
  const searchText = (document.getElementById("searchFilter")?.value || "").trim().toLowerCase();
  const qs = new URLSearchParams();
  if (status) qs.set("status", status);
  if (errorCategory) qs.set("errorCategory", errorCategory);

let data = [];
  let queueError = "";
  try {
    const response = await j(`${API}/queue?${qs.toString()}`);
    data = Array.isArray(response) ? response : [];
    queueDataCache = data;
  } catch (err) {
    queueError = `No se pudo cargar la cola: ${err.message}`;
    data = queueDataCache;
  }

  const retryRule = document.getElementById("retryRule")?.value || "";
  const filteredByRule = data.filter(x => {
    if (retryRule === "retryable") return Number(x.is_retryable) === 1;
    if (retryRule === "noretry") return Number(x.is_retryable) === 0;
    return true;
  });
  const filtered = filteredByRule.filter(x => {
    if (!searchText) return true;
    const haystack = [
      x.to_email,
      x.subject,
      x.error_category,
      x.status,
      x.error_message,
      x.MailProfile
    ]
      .map(v => String(v || "").toLowerCase())
      .join(" ");
    return haystack.includes(searchText);
  });

  const t=document.getElementById("tbl");
  t.innerHTML="<thead><tr><th><input type='checkbox' id='selectAllRows' onchange='toggleSelectAll()'></th><th>ID</th><th>Email</th><th>Asunto</th><th>Estado</th><th>Motivo</th><th>Regla</th><th>Retries</th><th>Error</th><th>Perfil</th><th>Creado</th><th>Intento</th></tr></thead><tbody>"
    + filtered.map(x=>`<tr>
      <td><input type="checkbox" class="rowSelector" value="${x.id}"></td>
      <td>${x.id}</td>
      <td>${x.to_email}</td>
      <td>${x.subject||''}</td>
      <td>${statusBadge(x.status)}</td>
      <td>${x.error_category || 'UNKNOWN'}</td>
      <td>${retryBadge(x.is_retryable)}</td>
      <td>${x.retries}</td>
      <td>${x.error_message||''}</td>
      <td>${x.MailProfile||''}</td>
      <td>${x.created_at||''}</td>
      <td>${x.last_attempt||''}</td>
    </tr>`).join("") + "</tbody>";
  feedback.textContent = queueError || `Mostrando ${filtered.length} registros${retryRule ? ` con regla "${retryRule}"` : ""}${searchText ? ` y búsqueda "${searchText}"` : ""}.`;
}

let producersCatalog = [];
let visibleProducersCatalog = [];
let availableDatabasesByTarget = {};
let selectedDatabasesByTarget = {};

const FALLBACK_PRODUCERS_BY_TARGET = {
  prod: [
    {
      procName: "SP_ENVIO_INFORMEPACIENTE_1",
      label: "Informe Paciente (Producción)",
      description: "Genera correos de informe para pacientes en entorno productivo."
    }
  ],
  test: [
    {
      procName: "SP_ENVIOMAILPERSONAL_PRUEBA",
      label: "Envío Personal (Prueba)",
      description: "SP de pruebas para validar envío controlado."
    }
  ]
};

function getRemoteTarget(){
  return document.getElementById("remoteTarget")?.value || "prod";
}

function producerOptionValue(producer){
  return `${producer.procName}||${producer.sourceDb || ""}`;
}

function findProducerByOptionValue(optionValue){
  return visibleProducersCatalog.find(p => producerOptionValue(p) === optionValue) || null;
}

function ensureSelectedDatabases(target){
  const available = availableDatabasesByTarget[target] || [];
  const selected = Array.isArray(selectedDatabasesByTarget[target]) ? selectedDatabasesByTarget[target] : [];
  const sanitized = selected.filter(db => available.includes(db));
  if (sanitized.length === 0 && available.length > 0) {
    selectedDatabasesByTarget[target] = [...available];
  } else {
    selectedDatabasesByTarget[target] = sanitized;
  }
}

function renderDatabaseFilterPanel(){
  const target = getRemoteTarget();
  const optionsContainer = document.getElementById("databaseFilterOptions");
  const summary = document.getElementById("databaseFilterSummary");
  const available = availableDatabasesByTarget[target] || [];
  ensureSelectedDatabases(target);
  const selected = selectedDatabasesByTarget[target] || [];

  if (!available.length) {
    optionsContainer.innerHTML = "<span class='small'>Sin bases configuradas para este ambiente.</span>";
    summary.textContent = "Sin filtros por base para este ambiente.";
    return;
  }

  optionsContainer.innerHTML = available
    .map(db => `
      <label class="db-filter-item">
        <input type="checkbox" value="${db}" ${selected.includes(db) ? "checked" : ""} onchange="toggleDatabaseSelection(this.value, this.checked)"/>
        <span>${db}</span>
      </label>
    `)
    .join("");

  summary.textContent = `Bases seleccionadas (${selected.length}/${available.length}): ${selected.join(", ")}`;
}

function toggleDatabaseSelection(databaseName, isChecked){
  const target = getRemoteTarget();
  const available = availableDatabasesByTarget[target] || [];
  const current = new Set(selectedDatabasesByTarget[target] || available);
  if (isChecked) current.add(databaseName);
  else current.delete(databaseName);

  if (current.size === 0 && available.length > 0) {
    feedback.textContent = "Debes dejar al menos una base seleccionada.";
    current.add(available[0]);
  }

  selectedDatabasesByTarget[target] = available.filter(db => current.has(db));
  renderDatabaseFilterPanel();
  renderProducerOptions();
}

function toggleSettingsPanel(){
  document.getElementById("settingsPanel")?.classList.toggle("hidden");
}

function onRemoteTargetChange(){
  loadProducers();
}

function renderProducerOptions(){
  const target = getRemoteTarget();
  const selectedDbs = new Set(selectedDatabasesByTarget[target] || []);
  const select = document.getElementById("producerSelect");
  const current = select.value;

  visibleProducersCatalog = producersCatalog.filter(producer => {
    if (!producer?.sourceDb) return true;
    return selectedDbs.has(producer.sourceDb);
  });

  select.innerHTML = "<option value=''>Seleccioná un SP</option>" + visibleProducersCatalog
    .map(p => `<option value="${producerOptionValue(p)}">${p.procName} — ${p.label}</option>`)
    .join("");

  if (visibleProducersCatalog.some(p => producerOptionValue(p) === current)) {
    select.value = current;
  }
  renderProducerDescription();
}

function renderProducerDescription(){
  const selected = document.getElementById("producerSelect")?.value || "";
  const producer = findProducerByOptionValue(selected);
  producerHelp.textContent = producer
    ? `${producer.label}: ${producer.description}`
    : "Sin selección.";
}

async function loadProducers(){
  try{
    const target = getRemoteTarget();
    let data = null;
    let producersEndpointMissing = false;
    try {
      data = await j(`${API}/actions/producers?target=${encodeURIComponent(target)}`);
    } catch (err) {
      if (String(err.message || "").includes("404")) {
        producersEndpointMissing = true;
      } else {
        throw err;
      }
    }

    if (producersEndpointMissing) {
      const diagnostics = await tryGet([
        `${API}/db/tables`,
        "/api/db/tables",
        "/db/tables"
      ]);
      const byTarget = diagnostics?.producersByTarget || FALLBACK_PRODUCERS_BY_TARGET;
      data = { producers: byTarget[target] || [] };
      feedback.textContent = "Catálogo de SP cargado con endpoint alternativo (/api/db/tables).";
    }

    producersCatalog = Array.isArray(data?.producers) ? data.producers : [];
    availableDatabasesByTarget = data?.availableDatabasesByTarget || {};
    if (!availableDatabasesByTarget[target]) {
      availableDatabasesByTarget[target] = [...new Set(producersCatalog.map(p => p.sourceDb).filter(Boolean))];
    }
    renderDatabaseFilterPanel();
    renderProducerOptions();
  }catch(err){
    feedback.textContent = `No se pudo cargar catálogo de SP: ${err.message}`;
  }
}

async function runSelectedProducer(){
  const selected = document.getElementById("producerSelect")?.value || "";
  const producer = findProducerByOptionValue(selected);
  if(!producer){
    feedback.textContent = "Seleccioná un SP para ejecutar.";
    return;
  }
  await runProducer(producer);
}

async function runSender(){
  await runAction("sender", async () => {
    await j(`${API}/actions/run-sender`, {method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({maxItems:100,user:"panel",target:getRemoteTarget()})});
    await loadAll();
  });
}

async function runAction(actionName, action){
  try{
    await action();
  }catch(err){
    feedback.textContent = `Error en ${actionName}: ${err.message}`;
  }
}

function selectedIds(){
  return Array.from(document.querySelectorAll(".rowSelector:checked"))
    .map(x => Number(x.value))
    .filter(Number.isInteger);
}

function toggleSelectAll(){
  const checked = document.getElementById("selectAllRows")?.checked;
  document.querySelectorAll(".rowSelector").forEach(chk => {
    chk.checked = Boolean(checked);
  });
}

async function deleteSelected(){
  await runAction("borrado de seleccionados", async () => {
    const ids = selectedIds();
    if(ids.length===0){
      feedback.textContent = "No hay filas seleccionadas para borrar.";
      return;
    }
    await j(`${API}/queue/delete`, {method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({ids})});
    feedback.textContent = `Se borraron ${ids.length} mails seleccionados.`;
    await loadAll();
  });
}

async function deleteFiltered(){
  await runAction("borrado por filtro", async () => {
    const status = document.getElementById("statusFilter")?.value || "";
    const errorCategory = document.getElementById("errorFilter")?.value || "";
    if(!status && !errorCategory){
      feedback.textContent = "Para borrar filtrados, elegí al menos Estado o Motivo de error.";
      return;
    }
    await j(`${API}/queue/delete`, {method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({status,errorCategory})});
    feedback.textContent = "Se borraron registros según el filtro actual.";
    await loadAll();
  });
}

async function requeueAll(){
  await runAction("reencolado total", async () => {
    await j(`${API}/actions/requeue-failed`, {method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({user:"panel",skipCategories:[]})});
    feedback.textContent = "Se reencolaron todos los Failed.";
    await loadAll();
  });
}
async function requeueRetryable(){
  await runAction("reencolado de recuperables", async () => {
    await j(`${API}/actions/requeue-failed`, {method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({user:"panel",skipCategories:["MAILBOX_FULL","MAILBOX_NOT_FOUND"]})});
    feedback.textContent = "Se reencolaron solo errores recuperables (excluye MAILBOX_FULL y MAILBOX_NOT_FOUND).";
    await loadAll();
  });
}
async function runProducer(producer){
  await runAction(`ejecución de ${producer.procName}`, async () => {
    await j(`${API}/actions/run-producer`, {method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({procName:producer.procName,sourceDb:producer.sourceDb || null,user:"panel",target:getRemoteTarget()})});
    await loadAll();
  });
}

function fmtCount(value){
  if(value === null || value === undefined) return "N/D";
  return Number(value).toLocaleString("es-AR");
}

async function tryGet(urls){
  let lastError = null;
  for (const url of urls) {
    try {
      return await j(url);
    } catch (err) {
      lastError = err;
      if (!String(err.message || "").includes("404")) {
        throw err;
      }
    }
  }
  if (lastError) throw lastError;
  return null;
}
async function loadAll(){
  await runAction("refresh", async () => {
    await loadProducers();
    await loadMetrics();
    await loadQueueNow();
  });
}

function statusBadge(status){
  if(status==="Sent") return `<span class="badge badge-ok">${status}</span>`;
  if(status==="Failed") return `<span class="badge badge-failed">${status}</span>`;
  return `<span class="badge badge-pending">${status}</span>`;
}

function retryBadge(isRetryable){
  if(Number(isRetryable)===1) return '<span class="badge badge-retry">Reintentar</span>';
  return '<span class="badge badge-noretry">No reintentar</span>';
}

document.addEventListener("click", (event) => {
  const panel = document.getElementById("settingsPanel");
  if (!panel || panel.classList.contains("hidden")) return;
  const isSettingsToggle = event.target.closest(".icon-btn");
  if (isSettingsToggle) return;
  if (!event.target.closest("#settingsPanel")) {
    panel.classList.add("hidden");
  }
});

initLoginForm();
checkAuth();
setInterval(async () => {
  try {
    const st = await j(`${AUTH}/status`);
    if (st.loggedIn) await loadAll();
  } catch (_err) {
    // Evita errores no controlados cuando la sesión expira o el backend falla temporalmente.
  }
}, 8000);
</script>
